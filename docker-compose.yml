services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: searcharr-backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      # Surcharge CORS pour pointer vers le frontend nginx
      ALLOWED_ORIGINS: "http://localhost,http://frontend"
    expose:
      - "8000"          # Pas exposé directement — proxy nginx
    networks:
      - searcharr
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: searcharr-frontend
    restart: unless-stopped
    ports:
      - "3120:80"
      #- "${FRONTEND_PORT:-3000}:80"
    networks:
      - searcharr
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost/health.txt"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

networks:
  searcharr:
    driver: bridge
